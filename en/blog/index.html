<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Blog | Saiba's Shogi Portal</title>
  <meta name="description" content="Shogi columns, tips, and thoughts from Saiba — helping beginners enjoy the game.">
  <link rel="icon" href="../../images/profile.webp" type="image/webp">
  <link rel="stylesheet" href="../../css/style.css">
  <link rel="canonical" href="https://saiba-zakki.com/en/blog/">
  <link rel="alternate" hreflang="x-default" href="https://saiba-zakki.com/en/blog/">
  <link rel="alternate" hreflang="en" href="https://saiba-zakki.com/en/blog/">
  <link rel="alternate" hreflang="ja" href="https://saiba-zakki.com/ja/blog/">
  <meta property="og:type" content="website">
  <meta property="og:site_name" content="Saiba's Shogi Portal">
  <meta property="og:title" content="Blog | Saiba's Shogi Portal">
  <meta property="og:description" content="Shogi columns, tips, and thoughts from Saiba — helping beginners enjoy the game.">
  <meta property="og:url" content="https://saiba-zakki.com/en/blog/">
  <meta property="og:image" content="https://saiba-zakki.com/images/profile.webp">
  <meta name="twitter:card" content="summary">
  <meta name="twitter:title" content="Blog | Saiba's Shogi Portal">
  <meta name="twitter:description" content="Shogi columns, tips, and thoughts from Saiba — helping beginners enjoy the game.">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3QWHMZKB7V"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-3QWHMZKB7V');
  </script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="../../" class="site-logo">Saiba's Shogi Portal</a>
      <nav class="site-nav">
        <a href="../">Books</a>
        <a href="./">Blog</a>
        <a href="../../ja/blog/" class="lang-switch">JA</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero" style="padding: 3.5rem 0;">
      <div class="container">
        <h1 class="hero-title">Blog</h1>
        <p class="hero-subtitle">Shogi columns, tips, and thoughts to help you enjoy and improve at the game.</p>
      </div>
    </section>

    <section class="section">
      <div class="container">
        <div class="post-list" id="post-list">
          <p style="color:var(--color-text-muted);">Loading...</p>
        </div>
      </div>
    </section>
  </main>

  <button class="back-to-top" aria-label="Back to top">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
      <path d="M9 14V4M4 9l5-5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <script>document.write(new Date().getFullYear())</script> saiba-zakki.com &nbsp;|&nbsp; <a href="../../">Back to top</a></p>
    </div>
  </footer>

  <script>
    fetch('posts.json')
      .then(r => r.json())
      .then(posts => {
        posts.sort((a, b) => new Date(b.date) - new Date(a.date));
        const list = document.getElementById('post-list');
        if (posts.length === 0) {
          list.innerHTML = '<p style="color:var(--color-text-muted);">No posts yet.</p>';
          return;
        }
        list.innerHTML = posts.map(post => {
          const thumbHtml = post.thumbnail
            ? `<div class="post-card-thumb"><img src="${post.thumbnail}" alt="${post.title}" loading="lazy"></div>`
            : '';
          const bodyClass = post.thumbnail ? 'post-card-body' : '';
          return `
            <a href="post/?slug=${post.slug}" class="post-card${post.thumbnail ? ' has-thumb' : ''}">
              ${thumbHtml}
              <div class="${bodyClass}">
                <div class="post-card-meta">
                  <span class="post-card-category">${post.category}</span>
                  <span>${post.date}</span>
                </div>
                <p class="post-card-title">${post.title}</p>
                <p class="post-card-excerpt">${post.lead}</p>
                <span class="post-card-readmore">Read more</span>
              </div>
            </a>
          `;
        }).join('');

        // JSON-LD
        const base = 'https://saiba-zakki.com';
        const ldJson = document.createElement('script');
        ldJson.type = 'application/ld+json';
        ldJson.textContent = JSON.stringify([
          {
            "@context": "https://schema.org",
            "@type": "Blog",
            "name": "Blog | Saiba's Shogi Portal",
            "url": base + "/en/blog/",
            "description": "Shogi columns, tips, and thoughts from Saiba — helping beginners enjoy the game.",
            "inLanguage": "en",
            "author": { "@type": "Person", "name": "Saiba", "url": base + "/" }
          },
          {
            "@context": "https://schema.org",
            "@type": "ItemList",
            "itemListElement": posts.map((post, i) => ({
              "@type": "ListItem",
              "position": i + 1,
              "url": `${base}/en/blog/post/?slug=${post.slug}`
            }))
          }
        ]);
        document.head.appendChild(ldJson);
      })
      .catch(() => {
        document.getElementById('post-list').innerHTML = '<p>Failed to load posts.</p>';
      });

    const backToTop = document.querySelector('.back-to-top');
    window.addEventListener('scroll', () => {
      backToTop.classList.toggle('is-visible', window.scrollY > 400);
    }, { passive: true });
    backToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
