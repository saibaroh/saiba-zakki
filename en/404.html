<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>404 Not Found | Saiba's Shogi Portal</title>
  <meta name="robots" content="noindex">
  <link rel="icon" href="../images/profile.webp" type="image/webp">
  <link rel="stylesheet" href="../css/style.css">
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-3QWHMZKB7V"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-3QWHMZKB7V');
  </script>
</head>
<body>
  <header class="site-header">
    <div class="container">
      <a href="../" class="site-logo">Saiba's Shogi Portal</a>
      <nav class="site-nav">
        <a href="./">Books</a>
        <a href="blog/">Blog</a>
        <a href="../ja/" class="lang-switch">JA</a>
      </nav>
    </div>
  </header>

  <main>
    <section class="hero" style="padding: 5rem 0;">
      <div class="container">
        <p style="font-size: 4rem; font-weight: bold; opacity: 0.4; line-height: 1; margin-bottom: 1rem;">404</p>
        <h1 class="hero-title" style="font-size: 1.6rem;">Page Not Found</h1>
        <p class="hero-subtitle" style="margin-top: 0.75rem;">
          The page you're looking for doesn't exist or may have moved.
        </p>
      </div>
    </section>

    <section class="section">
      <div class="container" style="text-align: center;">
        <div style="display: flex; flex-wrap: wrap; gap: 1rem; justify-content: center; margin-bottom: 2.5rem;">
          <a href="/en/" class="btn btn-primary">Books</a>
          <a href="/en/blog/" class="btn btn-primary">Blog</a>
          <a href="/" class="btn-ghost" style="display: inline-flex; align-items: center;">Back to top</a>
        </div>
      </div>
    </section>
  </main>

  <button class="back-to-top" aria-label="Back to top">
    <svg width="18" height="18" viewBox="0 0 18 18" fill="none" aria-hidden="true">
      <path d="M9 14V4M4 9l5-5 5 5" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
    </svg>
  </button>

  <footer class="site-footer">
    <div class="container">
      <p>&copy; <script>document.write(new Date().getFullYear())</script> saiba-zakki.com</p>
    </div>
  </footer>
  <script>
    const backToTop = document.querySelector('.back-to-top');
    window.addEventListener('scroll', () => {
      backToTop.classList.toggle('is-visible', window.scrollY > 400);
    }, { passive: true });
    backToTop.addEventListener('click', () => {
      window.scrollTo({ top: 0, behavior: 'smooth' });
    });
  </script>
</body>
</html>
